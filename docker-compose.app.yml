services:
  app:
    container_name: backend
    image: ${DOCKER_HUB_USERNAME}/database:${APP_IMAGE_TAG:-latest}
    platform: linux/amd64
    ports:
      - "3000:3001"
    env_file:
      - .env
    environment:
      NODE_ENV: prod
      POSTGRES_DATABASE_URL: ${POSTGRES_DATABASE_URL_PROD}
    restart: unless-stopped
    networks:
      - database_network

networks:
  database_network:
    name: database_network
    