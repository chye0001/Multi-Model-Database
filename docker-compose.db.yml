services:
  postgres:
    container_name: postgres_database
    image: ${DOCKER_HUB_USERNAME}/database-postgres:latest
    command: >
      postgres
      -c config_file=/etc/postgresql/postgresql.conf
      -c hba_file=/etc/postgresql/pg_hba.conf
      -c shared_preload_libraries=pg_cron
      -c cron.database_name=postgres
    ports:
      - ${POSTGRES_PORT_DEV}:5432
    environment:
      POSTGRES_USER: ${POSTGRES_ROOT_USER_DEV}
      POSTGRES_PASSWORD: ${POSTGRES_ROOT_PASSWORD_DEV}
      POSTGRES_DB: ${POSTGRES_DB_DEV}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    volumes:
      - database_volume:/var/lib/postgresql/data
      - ./database/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./database/postgres/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
      - ./database/postgres/backups/wal_archives:/var/lib/postgresql/wal_archive   # WAL segments land here
      - ./database/postgres/backups/base:/var/lib/postgresql/base_backup          # base backups land here

    networks:
      - database_network

  # the pg-backup service is known as a "sidecar" and is used as to do periodically backups
  pg-backup:
    image: postgres:17
    container_name: postgres_backup
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_BACKUP_USER: ${POSTGRES_BACKUP_USER}
      POSTGRES_BACKUP_PASSWORD: ${POSTGRES_BACKUP_PASSWORD}
    volumes:
      - ./database/postgres/backups/base:/var/lib/postgresql/base_backup
      - ./database/postgres/backups/backup.sh:/usr/local/bin/backup.sh:ro
    networks:
      - database_network
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        echo "Waiting for first backup in 5 seconds..."
        sleep 5
        while true; do
          bash /usr/local/bin/backup.sh
          echo "Next backup in 24 hours..."
          sleep 86400
        done
    restart: unless-stopped

  mongo:
    image: mongo:7
    container_name: mongo-standalone
    ports:
      - "27018:27017"
    environment:
      MONGO_INITDB_DATABASE: ${MONGO_DB_DEV}
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}     # root user credentials
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_BACKUP_USER: ${MONGO_BACKUP_USER}            # backup user credentials
      MONGO_BACKUP_PASSWORD: ${MONGO_BACKUP_PASSWORD}
      MONGO_APP_USER: ${MONGO_APP_USER}                  # app user credentials
      MONGO_APP_PASSWORD: ${MONGO_APP_PASSWORD} 
    volumes:
      - mongo_data:/data/db
      - ./database/mongo/init:/docker-entrypoint-initdb.d:ro
      - ./database/mongo/backups/base:/mongo_backup:ro
      - ./database/mongo/backups/restore.sh:/usr/local/bin/restore.sh:ro

    networks:
      - database_network
    healthcheck:
      test: ["CMD", "mongosh", "--quiet",
             "-u", "${MONGO_ROOT_USER}",
             "-p", "${MONGO_ROOT_PASSWORD}",
             "--authenticationDatabase", "admin",
             "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  mongo-backup:
    image: mongo:7
    container_name: mongo_backup
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      MONGO_BACKUP_PASSWORD: ${MONGO_BACKUP_PASSWORD}       # ← only secret it needs
    volumes:
      - mongo_data:/data/db:ro
      - ./database/mongo/backups/base:/mongo_backup
      - ./database/mongo/backups/backup.sh:/usr/local/bin/backup.sh:ro
    networks:
      - database_network
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        sleep 10
        while true; do
          bash /usr/local/bin/backup.sh
          sleep 86400
        done
    restart: unless-stopped

  neo4j:
    image: neo4j:5
    container_name: neo4j
    ports:
      - "7474:7474" # Neo4j Browser (GUI)
      - "7687:7687" # Bolt protocol (driver connects here)
    volumes:
      - neo4j_data:/data
    environment:
      NEO4J_AUTH: ${NEO4J_ROOT_USERNAME_DEV}/${NEO4J_ROOT_PASSWORD_DEV}
    healthcheck:
      test:
        [
          "CMD",
          "cypher-shell",
          "-u",
          "${NEO4J_ROOT_USERNAME_DEV}",
          "-p",
          "${NEO4J_ROOT_PASSWORD_DEV}",
          "RETURN 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - database_network

  neo4j-init:
    image: neo4j:5
    container_name: neo4j_init
    depends_on:
      neo4j:
        condition: service_healthy
    volumes:
      - ./database/neo4j/cyphers/constraints-and-indexes.cypher:/init/constraints-and-indexes.cypher:ro
    environment:
      NEO4J_USERNAME: ${NEO4J_ROOT_USERNAME_DEV}
      NEO4J_PASSWORD: ${NEO4J_ROOT_PASSWORD_DEV}
    networks:
      - database_network
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        echo "Applying Neo4j constraints and indexes..."
        cypher-shell -a bolt://neo4j:7687 -u $$NEO4J_USERNAME -p $$NEO4J_PASSWORD -f /init/constraints-and-indexes.cypher
        if [ $$? -eq 0 ]; then
          echo "Constraints and indexes applied successfully."
        else
          echo "Failed to apply constraints and indexes."
          exit 1
        fi
    restart: "no"
  
  neo4j-backup:
    image: neo4j:5
    container_name: neo4j_backup
    depends_on:
      neo4j:
        condition: service_healthy
    environment:
      NEO4J_USERNAME: ${NEO4J_ROOT_USERNAME_DEV}
      NEO4J_PASSWORD: ${NEO4J_ROOT_PASSWORD_DEV}
    volumes:
      - neo4j_data:/data                                                      # same volume as neo4j
      - ./database/neo4j/backups/base:/neo4j_backup                           # where dumps land
      - ./database/neo4j/backups/backup.sh:/usr/local/bin/backup.sh:ro
      - /var/run/docker.sock:/var/run/docker.sock        # ← Docker remote control.. bad practice in prod, will give sidecar full access to docker deamon lol
    networks:
      - database_network
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        echo "Installing Docker CLI..."
        apt-get update -qq && apt-get install -y -qq docker.io
        echo "Install complete. Waiting before first backup..."
        sleep 15
        while true; do
          bash /usr/local/bin/backup.sh
          echo "Next backup in 24 hours..."
          sleep 86400
        done
    restart: unless-stopped

volumes:
  database_volume:
    name: postgres_data
  mongo_data:
    name: mongo_data
  neo4j_data:
    name: neo4j_data

networks:
  database_network:
    name: database_network
